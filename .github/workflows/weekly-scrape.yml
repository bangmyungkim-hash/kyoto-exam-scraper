name: 京都高校受験情報 週次収集

on:
  schedule:
    # 毎週月曜 AM 6:00 JST（UTC 21:00 日曜）
    - cron: "0 21 * * 0"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - run: python scrapers/public_exam.py

      - run: python scrapers/school_events.py

      - name: データを Git にコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: 自動更新 $(date '+%Y-%m-%d')"
          git push
